services:
  - type: web
    name: nigeria-construction-ai-api
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: API_PREFIX
        value: /api/v1
      - key: REDIS_URL
        fromService:
          type: redis
          name: nigeria-construction-ai-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: nigeria-construction-ai-db
          property: connectionString

  - type: redis
    name: nigeria-construction-ai-redis
    ipAllowList: []

databases:
  - name: nigeria-construction-ai-db
    plan: starter
